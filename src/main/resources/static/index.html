<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring AI SMS Extractor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6 font-sans">

<div class="max-w-4xl w-full bg-white rounded-2xl shadow-xl overflow-hidden flex flex-col md:flex-row">

    <div class="w-full md:w-1/2 p-8 border-r border-slate-100 bg-white flex flex-col justify-center">
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-slate-800 flex items-center gap-2">
                <svg class="w-6 h-6 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Spring AI Extractor
            </h1>
            <p class="text-slate-500 text-sm mt-2">Powered by Google Gemini</p>
        </div>

        <label class="block text-sm font-semibold text-slate-700 mb-2">Raw Bank SMS</label>
        <textarea id="smsInput" class="w-full h-40 p-4 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition-all resize-none text-slate-700 text-sm leading-relaxed" spellcheck="false">A/c *9985 debited Rs. 3604.00 on 10-05-26 to Jio Recharge. UPI:757803378119. Not you? SMS BLOCK to 9289592895, Dial 1930 for Cyber Fraud - Indian Bank</textarea>

        <button id="extractBtn" onclick="simulateExtraction()" class="mt-6 w-full bg-slate-900 hover:bg-slate-800 text-white font-medium py-3 px-4 rounded-xl transition-colors flex justify-center items-center gap-2">
            <span>Extract with AI</span>
        </button>
    </div>

    <div class="w-full md:w-1/2 bg-slate-900 p-8 flex flex-col">
        <div class="flex justify-between items-center mb-4">
            <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">JSON Output</span>
            <div id="loading" class="hidden flex gap-1">
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-bounce"></div>
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                <div class="w-2 h-2 bg-emerald-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
            </div>
        </div>

        <div class="flex-grow bg-slate-950 rounded-xl border border-slate-800 overflow-hidden relative">
            <pre class="m-0 h-full p-6 text-sm overflow-auto"><code id="jsonOutput" class="language-json text-slate-300">// Awaiting SMS input...</code></pre>
        </div>
    </div>

</div>

<script>
    // Start Highlight.js
    hljs.highlightAll();

    function simulateExtraction() {
        const btn = document.getElementById('extractBtn');
        const loading = document.getElementById('loading');
        const output = document.getElementById('jsonOutput');
        const sms = document.getElementById('smsInput').value;

        // UI Loading State
        btn.disabled = true;
        btn.innerHTML = '<span class="opacity-50">Processing via Gemini...</span>';
        loading.classList.remove('hidden');
        output.textContent = '';

        // Hardcoded JSON result for the demo
        const simulatedResult = {
            "is_transaction": true,
            "transaction_type": "EXPENSE",
            "amount": 3604.00,
            "currency": "INR",
            "merchant": "Jio Recharge",
            "payment_method": "UPI",
            "bank": "Indian Bank",
            "account_last4": "9985",
            "reference_id": "757803378119",
            "timestamp": "10-05-2026",
            "status": "SUCCESS"
        };

        // Simulate network delay (1.5 seconds)
        setTimeout(() => {
            output.textContent = JSON.stringify(simulatedResult, null, 2);
            hljs.highlightElement(output); // Apply syntax highlighting

            // Reset UI
            btn.disabled = false;
            btn.innerHTML = '<span>Extract with AI</span>';
            loading.classList.add('hidden');
        }, 1500);
    }
</script>
</body>
</html>
